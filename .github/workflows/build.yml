name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Remove duplicate XML icons (if any remain from old commits)
        run: |
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            rm -f app/src/main/res/mipmap-${density}/ic_launcher.xml
            rm -f app/src/main/res/mipmap-${density}/ic_launcher_round.xml
          done
          echo "Clean done — remaining mipmap files:"
          find app/src/main/res/mipmap-* -type f | sort

      - name: Build Debug APK
        run: gradle assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TradingReplay-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
